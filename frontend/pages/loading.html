<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>MoodStream - Analyzing Emotion</title>
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/app.css">
  <script src="../js/vendor/tailwind.js"></script>
  <script src="../js/tailwind-config.js"></script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen overflow-hidden selection:bg-primary-container selection:text-on-primary-container">

  <!-- Animated "Vibe Canvas" WebGL background (degrades to the dark bg if WebGL is unavailable) -->
  <canvas id="shader-canvas" class="fixed inset-0 w-full h-full z-0 pointer-events-none"></canvas>

  <!-- TopAppBar -->
  <header class="fixed top-0 right-0 w-[calc(100%-280px)] backdrop-blur-md bg-background/80 flex items-center h-16 px-8 ml-[280px] z-30 transition-colors duration-300 gap-6">
    <div class="flex items-center gap-4">
      <button class="text-on-surface-variant hover:text-white transition-colors"><span class="material-symbols-outlined text-[24px]">chevron_left</span></button>
      <button class="text-on-surface-variant hover:text-white transition-colors"><span class="material-symbols-outlined text-[24px]">chevron_right</span></button>
    </div>
    <div class="flex items-center gap-4 flex-grow justify-end">
      <button class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-white hover:bg-surface-container-highest transition-colors"><span class="material-symbols-outlined filled">home</span></button>
      <div class="relative w-full max-w-md">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
        <input class="w-full bg-surface-container-high border-none rounded-full py-2.5 pl-12 pr-6 text-on-surface placeholder:text-on-surface-variant focus:ring-1 focus:ring-primary transition-all font-body-md" placeholder="What do you want to play?" type="text">
      </div>
      <div class="flex items-center gap-4 ml-2">
        <button class="w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-white/5 transition-colors"><span class="material-symbols-outlined">notifications</span></button>
        <div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant flex items-center justify-center text-on-surface-variant"><span class="material-symbols-outlined text-[20px]">person</span></div>
      </div>
    </div>
  </header>

  <!-- SideNavBar -->
  <aside class="w-[280px] h-full fixed left-0 top-0 border-r border-white/10 backdrop-blur-xl shadow-sm bg-surface-container-low flex flex-col py-8 px-6 gap-stack-md z-30 overflow-y-auto">
    <div class="flex items-center gap-4 mb-4">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(183,109,255,0.2)]"><img src="../assets/img/logo.png" alt="MoodStream logo" class="w-full h-full object-contain"></div>
      <div>
        <h1 class="text-headline-md font-headline-md font-bold text-primary tracking-tight">MoodStream</h1>
        <p class="text-label-sm font-label-sm text-on-surface-variant opacity-80">Emotional Discovery</p>
      </div>
    </div>
    <nav class="flex flex-col mt-4 flex-grow gap-[2px]">
      <div class="flex items-center justify-between mt-6 mb-2 pl-3 pr-1">
        <p class="text-label-sm font-label-sm text-outline-variant uppercase tracking-wider">Playlists</p>
        <button class="w-8 h-8 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-white/5 hover:text-primary transition-colors"><span class="material-symbols-outlined text-[20px]">add</span></button>
      </div>
      <div class="flex items-center justify-between px-3 py-2 mb-2 text-on-surface-variant hover:text-on-surface transition-colors cursor-pointer">
        <span class="material-symbols-outlined text-[20px]">search</span>
        <div class="flex items-center gap-2"><span class="text-label-md font-label-md">Recents</span><span class="material-symbols-outlined text-[20px]">list</span></div>
      </div>
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant font-label-md hover:bg-white/5 transition-colors" href="#"><span class="material-symbols-outlined">sentiment_satisfied</span><span class="text-label-md font-label-md">Happy Songs</span></a>
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant font-label-md hover:bg-white/5 transition-colors" href="#"><span class="material-symbols-outlined">sentiment_very_dissatisfied</span><span class="text-label-md font-label-md">Angry</span></a>
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant font-label-md hover:bg-white/5 transition-colors" href="#"><span class="material-symbols-outlined">sentiment_neutral</span><span class="text-label-md font-label-md">Neutral</span></a>
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant font-label-md hover:bg-white/5 transition-colors" href="#"><span class="material-symbols-outlined">mood_bad</span><span class="text-label-md font-label-md">Crying TT</span></a>
    </nav>
    <div class="mt-auto pt-6 pb-24"></div>
  </aside>

  <!-- Main Content Area - Loading Screen -->
  <main class="ml-[280px] mt-16 h-[calc(100vh-64px-88px)] flex flex-col items-center justify-center relative p-container-padding pb-32">
    <div class="absolute inset-0 pointer-events-none overflow-hidden z-0 flex items-center justify-center opacity-30">
      <div class="w-[600px] h-[600px] bg-primary-container rounded-full blur-[120px] mix-blend-screen opacity-20"></div>
      <div class="w-[400px] h-[400px] bg-tertiary-container rounded-full blur-[100px] mix-blend-screen opacity-10 absolute top-1/4 right-1/4"></div>
    </div>

    <div class="z-10 flex flex-col items-center justify-center max-w-2xl w-full">
      <div class="relative w-64 h-64 mb-12 flex items-center justify-center">
        <div class="relative w-56 h-56 flex items-center justify-center pulse-text">
          <img src="../assets/img/loading.png" alt="Analyzing emotion" class="w-44 h-44 object-contain drop-shadow-[0_0_25px_rgba(221,183,255,0.45)]">
        </div>
      </div>

      <div class="w-full max-w-md space-y-stack-sm flex flex-col items-center">
        <div class="w-full h-2 bg-surface-container-highest rounded-full overflow-hidden border border-white/5">
          <div class="h-full bg-primary rounded-full progress-bar-fill w-[65%] relative">
            <div class="absolute inset-0 bg-white/20 w-full"></div>
          </div>
        </div>
        <p class="text-headline-md font-headline-md text-on-surface mt-6 pulse-text tracking-wide">Analyzing Emotion...</p>
        <p class="text-label-md font-label-md text-on-surface-variant mt-2 opacity-70">Scanning micro-expressions and tone</p>
      </div>
    </div>
  </main>

  <!-- Persistent Bottom Music Player -->
  <footer class="fixed bottom-0 left-0 right-0 w-full h-24 bg-surface-container/80 backdrop-blur-xl border-t border-white/10 z-50 flex items-center px-8 justify-between">
    <div class="flex items-center gap-4 w-1/4">
      <div class="w-14 h-14 rounded-lg overflow-hidden shadow-lg bg-surface-container-high flex items-center justify-center"><span class="material-symbols-outlined text-on-surface-variant">music_note</span></div>
      <div class="flex flex-col"><span class="text-on-surface font-bold font-headline-md text-body-md">Snowfall</span><span class="text-on-surface-variant text-label-sm">Oneheart</span></div>
    </div>
    <div class="flex items-center gap-6">
      <button class="text-on-surface-variant hover:text-primary transition-colors"><span class="material-symbols-outlined">skip_previous</span></button>
      <button class="w-12 h-12 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-lg hover:scale-105 transition-transform"><span class="material-symbols-outlined filled">pause</span></button>
      <button class="text-on-surface-variant hover:text-primary transition-colors"><span class="material-symbols-outlined">skip_next</span></button>
    </div>
    <div class="flex items-center gap-4 flex-grow max-w-md mx-8">
      <div class="flex gap-[2px] h-8 flex-grow items-center">
        <div class="w-1 h-4 bg-primary rounded-full"></div><div class="w-1 h-6 bg-primary rounded-full"></div><div class="w-1 h-3 bg-primary rounded-full"></div><div class="w-1 h-8 bg-primary rounded-full"></div><div class="w-1 h-5 bg-primary rounded-full"></div><div class="w-1 h-7 bg-primary rounded-full"></div><div class="w-1 h-4 bg-primary rounded-full"></div><div class="w-1 h-6 bg-primary rounded-full"></div><div class="w-1 h-3 bg-primary rounded-full"></div><div class="w-1 h-5 bg-primary rounded-full"></div><div class="w-1 h-4 bg-primary rounded-full"></div><div class="w-1 h-6 bg-primary rounded-full"></div><div class="w-1 h-2 bg-primary rounded-full"></div><div class="w-1 h-5 bg-white/20 rounded-full"></div><div class="w-1 h-7 bg-white/20 rounded-full"></div><div class="w-1 h-4 bg-white/20 rounded-full"></div><div class="w-1 h-6 bg-white/20 rounded-full"></div><div class="w-1 h-3 bg-white/20 rounded-full"></div><div class="w-1 h-8 bg-white/20 rounded-full"></div><div class="w-1 h-5 bg-white/20 rounded-full"></div><div class="w-1 h-7 bg-white/20 rounded-full"></div><div class="w-1 h-4 bg-white/20 rounded-full"></div><div class="w-1 h-6 bg-white/20 rounded-full"></div><div class="w-1 h-3 bg-white/20 rounded-full"></div><div class="w-1 h-5 bg-white/20 rounded-full"></div><div class="w-1 h-4 bg-white/20 rounded-full"></div><div class="w-1 h-6 bg-white/20 rounded-full"></div><div class="w-1 h-2 bg-white/20 rounded-full"></div>
      </div>
      <span class="text-on-surface-variant font-label-sm">03:12</span>
    </div>
    <div class="flex items-center gap-4 w-1/4 justify-end">
      <button class="text-on-surface-variant hover:text-primary transition-colors"><span class="material-symbols-outlined">shuffle</span></button>
      <button class="text-on-surface-variant hover:text-primary transition-colors"><span class="material-symbols-outlined">queue_music</span></button>
      <button class="text-on-surface-variant hover:text-primary transition-colors"><span class="material-symbols-outlined">volume_up</span></button>
    </div>
  </footer>

  <script src="../js/shader.js"></script>
  <script src="../js/loading.js"></script>
</body>
</html>
